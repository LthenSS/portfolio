<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        background: #f5f7fb;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .login-shell {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .login-card {
        width: 100%;
        max-width: 430px;
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 10px 35px rgba(15, 23, 42, 0.08);
        padding: 36px 32px;
      }

      .login-card .form-control {
        border-radius: 12px;
        padding: 0.8rem 0.95rem;
        padding-left: 2.8rem;
      }

      .input-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: #6c757d;
        pointer-events: none;
      }

      .password-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        border: 0;
        background: transparent;
        color: #6c757d;
      }

      .btn-primary {
        border-radius: 12px;
        padding: 0.8rem 1rem;
      }
    </style>
  </head>
  <body>
    <div class="login-shell">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-sm-10 col-md-8 col-lg-5">
            <a href="/" class="text-decoration-none text-secondary d-inline-flex align-items-center mb-3">
              <i class="bi bi-arrow-left me-2"></i>
              <span>Kembali ke Beranda</span>
            </a>

            <div class="login-card">
              <div class="text-center mb-4">
                <h2 class="fw-bold mb-2">Admin Login</h2>
                <p class="text-muted mb-0">Masuk untuk mengelola data portofolio.</p>
              </div>

              {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                  {% for category, message in messages %}
                    <div class="alert alert-{{ category if category in ['success','danger','warning','info'] else 'danger' }} alert-dismissible fade show" role="alert">
                      {{ message }}
                      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                  {% endfor %}
                {% endif %}
              {% endwith %}

              <form method="post" action="{{ url_for('login.login_submit') }}">
                <div class="mb-3 position-relative">
                  <i class="bi bi-person input-icon"></i>
                  <input type="text" class="form-control" name="username" placeholder="Masukkan username" required>
                </div>

                <div class="mb-4 position-relative">
                  <i class="bi bi-lock input-icon"></i>
                  <input type="password" class="form-control" id="passwordInput" name="password" placeholder="Masukkan password" required>
                  <button type="button" class="password-toggle" onclick="togglePassword()" aria-label="Toggle password visibility">
                    <i class="bi bi-eye" id="passwordIcon"></i>
                  </button>
                </div>

                <button type="submit" class="btn btn-primary w-100">Masuk</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function togglePassword() {
        const input = document.getElementById('passwordInput');
        const icon = document.getElementById('passwordIcon');
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        icon.className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
      }
    </script>
  </body>
</html>
